name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for CI workflow success on current SHA
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const workflowName = "CI";
            const requiredJobs = ["backend-tests", "frontend-tests"];
            const timeoutMs = 15 * 60 * 1000;
            const pollEveryMs = 15000;
            const startedAt = Date.now();

            async function findRun() {
              const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner,
                repo,
                event: "push",
                head_sha: sha,
                per_page: 100,
              });
              return runs.find((run) => run.name === workflowName);
            }

            while (Date.now() - startedAt < timeoutMs) {
              const run = await findRun();
              if (!run) {
                core.info(`CI run not found yet for ${sha}.`);
                await new Promise((resolve) => setTimeout(resolve, pollEveryMs));
                continue;
              }

              core.info(`Found CI run ${run.id} with status=${run.status} conclusion=${run.conclusion}`);
              if (run.status !== "completed") {
                await new Promise((resolve) => setTimeout(resolve, pollEveryMs));
                continue;
              }
              if (run.conclusion !== "success") {
                core.setFailed(`CI workflow concluded with ${run.conclusion}.`);
                return;
              }

              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner,
                repo,
                run_id: run.id,
                per_page: 100,
              });
              const missingOrFailed = requiredJobs.filter((jobName) => {
                const job = jobs.find((entry) => entry.name === jobName);
                return !job || job.conclusion !== "success";
              });

              if (missingOrFailed.length > 0) {
                core.setFailed(`Required CI jobs not successful: ${missingOrFailed.join(", ")}`);
                return;
              }

              core.info("Required CI jobs succeeded.");
              return;
            }

            core.setFailed("Timed out while waiting for the CI workflow to complete.");

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: wait-for-ci
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for GitHub Pages
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
