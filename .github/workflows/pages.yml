name: Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'CI' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Confirm successful CI run
        run: echo "CI succeeded for ${{ github.event.workflow_run.head_sha }}."

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: quality-gate
    environment:
      name: github-pages
      url: ${{ steps.deploy_retry.outputs.page_url || steps.deploy_first.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for GitHub Pages
        env:
          VITE_GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - name: Deploy GitHub Pages
        id: deploy_first
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying GitHub Pages deployment
        if: steps.deploy_first.outcome == 'failure'
        run: sleep 15

      - name: Retry GitHub Pages deployment
        id: deploy_retry
        if: steps.deploy_first.outcome == 'failure'
        uses: actions/deploy-pages@v4
